# QueueFlow — Render Blueprint (free single-service deploy).
#
# Provisions:
#   - queueflow-api        : Docker web service (Express API + WebSocket + inline worker)
#   - queueflow-dashboard  : static Next.js export
#
# External managed services you provide once (entered when the blueprint syncs):
#   - DATABASE_URL : Neon Postgres connection string (?sslmode=require)
#   - REDIS_URL    : Upstash Redis connection string (rediss://...)
#
# Both secrets live in an env group so you enter them a single time. To scale the
# worker horizontally, add a `type: worker` service (paid) running the same image
# with `node packages/worker/dist/index.js` and set RUN_WORKER_INLINE=false here.

envVarGroups:
  - name: queueflow-secrets
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

services:
  - type: web
    name: queueflow-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    # Schema is applied out-of-band against Neon (npm run db:migrate). It's idempotent
    # (CREATE IF NOT EXISTS); pre-deploy hooks are a paid Render feature, so we skip them.
    envVars:
      - fromGroup: queueflow-secrets
      - key: NODE_ENV
        value: production
      - key: RUN_WORKER_INLINE
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      # Tuned for per-request Redis (Upstash): poll slower, back off harder when idle.
      - key: WORKER_POLL_MS
        value: "250"
      - key: WORKER_MAX_IDLE_MS
        value: "5000"
      - key: WORKER_MAINTENANCE_MS
        value: "5000"
      - key: WORKER_DEPTH_MS
        value: "10000"
      # Allow the dashboard origin. Pinned to the full URL — Render's `fromService
      # host` resolves to just the slug (no .onrender.com), which breaks CORS matching.
      - key: CORS_ORIGINS
        value: https://queueflow-dashboard.onrender.com

  - type: web
    name: queueflow-dashboard
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/out
    pullRequestPreviewsEnabled: false
    envVars:
      # Baked into the static bundle at build time. Pinned to the API's full URL —
      # Render's `fromService host` resolves to just the slug (no .onrender.com).
      - key: NEXT_PUBLIC_API_URL
        value: https://queueflow-api-zxzh.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
